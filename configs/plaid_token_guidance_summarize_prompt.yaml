# Test: "The article can be summarized as follows:" prompt suffix
# Compare against original code with same prompt.

weights_path: "models/plaid/plaid1b_weights"
dim: 2048
embed_dim: 16
n_blocks: 24
n_heads: 32
vocab_size: 32768
gamma_0: -3.0
gamma_1: 6.0

data_dir: "datasets/glge-released-dataset/easy/xsum_data/org_data"
tokenizer_path: "models/plaid/plaid1b_weights/tokenizer.json"
eval_split: "dev"

seq_len: 1024
max_article_tokens: 900
sampling_timesteps: 1024
score_temp: 0.9
guidance_weight: 2.0
prompt_suffix: "\n\nThe article can be summarized as follows:"
num_samples: 10

output_dir: "./experiments/plaid_xsum/token_guidance_summarize_prompt"

infra:
  version: "1"
  folder: "./experiments/cache/plaid_token_guidance_summarize_prompt"
  cluster: slurm
  gpus_per_node: 1
  cpus_per_task: 4
  mem_gb: 64
  timeout_min: 720
  slurm_partition: plgrid-gpu-a100

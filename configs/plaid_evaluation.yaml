# =============================================================================
# PLAID SAE Evaluation Config (Iterative)
# =============================================================================
# Evaluates SAE reconstruction impact on PLAID 1B by running the full
# reverse diffusion chain with and without SAE activation patching.
#
# Run:
#   uv run python main.py evaluate-plaid configs/plaid_evaluation.yaml
#
# Submit to Slurm:
#   uv run python main.py evaluate-plaid configs/plaid_evaluation.yaml \
#       --submit --infra.cluster=slurm
# =============================================================================

# -- Model --------------------------------------------------------------------
weights_path: "models/plaid/plaid1b_weights"
dim: 2048
embed_dim: 16
n_blocks: 24
n_heads: 32
vocab_size: 32768
gamma_0: -3.0
gamma_1: 6.0

# -- SAE checkpoints ---------------------------------------------------------
sae_checkpoint_dir: "./experiments/sae_checkpoints/plaid"
sae_layers: [0, 23]
prefer_best: true

# -- Dataset ------------------------------------------------------------------
# NOTE: openwebtext only has a "train" split. For evaluation we should ideally
# use a held-out set. Use skip_samples to carve out a disjoint slice, or
# switch to a dataset with a proper validation split.
dataset_name: "openwebtext"
dataset_split: "train"
max_samples: 200
seq_len: 256

# -- Evaluation ---------------------------------------------------------------
eval_mode: "iterative"
sampling_timesteps: 256
score_temp: 0.9
batch_size: 4
device: "cuda:0"

# -- Logging ------------------------------------------------------------------
use_wandb: true
wandb_project: "plaid-sae"

# -- Output -------------------------------------------------------------------
output_dir: "./experiments/plaid_results"

# -- Exca infra ---------------------------------------------------------------
infra:
  version: "1"
  folder: "./experiments/cache/plaid_evaluation"
  cluster: null
  gpus_per_node: 1
  cpus_per_task: 4
  mem_gb: 64
  timeout_min: 720
  slurm_partition: plgrid-gpu-a100

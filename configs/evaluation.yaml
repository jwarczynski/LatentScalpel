# =============================================================================
# Evaluation Config
# =============================================================================
# Evaluates SAE reconstruction impact on model loss and generation quality.
#
# Run:
#   uv run python main.py evaluate configs/evaluation.yaml
#
# Override infra for slurm:
#   uv run python main.py evaluate configs/evaluation.yaml \
#       --infra.cluster=slurm --infra.gpus_per_node=1
# =============================================================================

# -- Model --------------------------------------------------------------------
model_checkpoint_path: "GENIE_ckpt-XSum"
model_arch: "s2s_CAT"
in_channel: 128
model_channels: 128
out_channel: 128
vocab_size: 30522
config_name: "bert-base-uncased"
logits_mode: 1
init_pretrained: false
token_emb_type: "random"
learn_sigma: false
fix_encoder: false

# -- Input paths --------------------------------------------------------------
sae_checkpoint_dir: "./experiments/sae_checkpoints"
activation_dir: "./experiments/activations"

# -- Dataset ------------------------------------------------------------------
dataset_name: "xsum"
dataset_split: "train"
max_samples: 1000

# -- Diffusion ----------------------------------------------------------------
diffusion_steps: 2000
noise_schedule: "sqrt"
diffusion_timesteps: [100, 200, 300, 400, 500, 600, 700, 800, 900, 1000]

# -- Evaluation ---------------------------------------------------------------
batch_size: 16
num_generation_samples: 50
device: "cuda:0"

# -- Output -------------------------------------------------------------------
output_dir: "./experiments/results"

# -- Exca infra ---------------------------------------------------------------
infra:
  version: "1"
  folder: "./experiments/cache/evaluation"
  cluster: null
  gpus_per_node: 1
  cpus_per_task: 4
  mem_gb: 32
  timeout_min: 360
  slurm_partition: null
  slurm_constraint: null

# =============================================================================
# PLAID XSum Fine-Tuning Config
# =============================================================================
# Fine-tunes PLAID 1B on XSum summarization with VLB loss, supports
# conditional generation via inpainting or gradient-based token guidance.
#
# Run:
#   uv run python main.py finetune-plaid configs/plaid_xsum_finetune.yaml
#
# Submit to Slurm:
#   uv run python main.py finetune-plaid configs/plaid_xsum_finetune.yaml \
#       --submit --infra.cluster=slurm
# =============================================================================

# -- Model --------------------------------------------------------------------
weights_path: "models/plaid/plaid1b_weights"
dim: 2048
embed_dim: 16
n_blocks: 24
n_heads: 32
vocab_size: 32768
gamma_0: -3.0
gamma_1: 6.0

# -- Dataset ------------------------------------------------------------------
data_dir: "datasets/glge-released-dataset/easy/xsum_data/org_data"
seq_len: 1024
max_summary_len: 64
tokenizer_path: "models/plaid/plaid1b_weights/tokenizer.json"

# -- Training -----------------------------------------------------------------
batch_size: 8
learning_rate: 1.0e-4
weight_decay: 0.01
betas: [0.9, 0.999]
num_epochs: 10
warmup_steps: 1000
bias_warmup_steps: 5000
target_bias_scale: 1.0
self_cond_prob: 0.25
reconst_bs: null
clip_quantile: 0.95
freeze_layers: null
num_workers: 4

# -- Training mode ------------------------------------------------------------
# "unconditional": VLB loss on full [article|SEP|summary] sequence (PLAID paper)
# "conditional": inpaint article during training, loss on summary tokens only
training_mode: "unconditional"

# -- Distributed --------------------------------------------------------------
strategy: "ddp"
num_gpus: 1
precision: "bf16-mixed"
gradient_checkpointing: true

# -- Sampling -----------------------------------------------------------------
sampling_timesteps: 256
score_temp: 0.9
guidance_scale: 1.0
sampler: "inpainting"
num_eval_samples: 5

# -- Logging ------------------------------------------------------------------
use_wandb: true
wandb_project: "plaid-xsum"
log_interval: 50
noise_schedule_log_interval: 500

# -- Checkpointing ------------------------------------------------------------
output_dir: "./experiments/plaid_xsum"
resume_from: null

# -- Exca infra ---------------------------------------------------------------
infra:
  version: "1"
  folder: "./experiments/cache/plaid_xsum_finetune"
  cluster: null
  gpus_per_node: 1
  cpus_per_task: 4
  mem_gb: 64
  timeout_min: 2880
  slurm_partition: plgrid-gpu-a100

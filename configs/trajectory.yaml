# =============================================================================
# Trajectory Feature Collection Config
# =============================================================================
# Runs the full denoising trajectory and records which SAE features are active
# at each timestep, with their activation magnitudes.
#
# Run:
#   uv run python main.py collect-trajectory configs/trajectory.yaml
#
# Submit to Slurm:
#   uv run python main.py collect-trajectory configs/trajectory.yaml \
#       --submit --infra.cluster=slurm
# =============================================================================

# -- Model --------------------------------------------------------------------
model_checkpoint_path: "models/genie/GENIE_ckpt-XSum"
model_arch: "s2s_CAT"
in_channel: 128
model_channels: 128
out_channel: 128
vocab_size: 30522
config_name: "bert-base-uncased"
logits_mode: 1
init_pretrained: false
token_emb_type: "random"
learn_sigma: false
fix_encoder: false

# -- SAE ---------------------------------------------------------------------
sae_checkpoint_dir: "./experiments/sae_checkpoints/genie"
layers: [0, 1, 4, 5]

# -- Dataset ------------------------------------------------------------------
# NOTE: Use all validation examples for reliable heatmap plots. Small sample
# sizes (e.g. 50) are insufficient for drawing conclusions.
dataset_name: "xsum"
dataset_split: "validation"
max_samples: null

# -- Diffusion ----------------------------------------------------------------
diffusion_steps: 2000
noise_schedule: "sqrt"
timestep_subsample: 10  # record every 10th step -> 200 timesteps

# -- Collection ---------------------------------------------------------------
batch_size: 4
top_k_to_record: 64
device: "cuda:0"
random_seed: 42
output_path: "./experiments/results/genie/trajectory"
checkpoint_interval: 50  # save checkpoint every 50 batches for resume

# Job array parallelization: each job processes samples_per_job samples
# XSum validation has 11332 samples. With ~150 samples/hour, use 150 per job.
# This creates ~76 jobs, each running ~1 hour.
sample_start: 0  # override via CLI for each job
samples_per_job: 150  # ~1 hour per job

# -- Exca infra ---------------------------------------------------------------
infra:
  version: "2"  # bumped for job array support
  folder: "./experiments/cache/trajectory"
  cluster: slurm
  gpus_per_node: 1
  cpus_per_task: 4
  mem_gb: 64
  timeout_min: 90  # 1.5 hours max per job
  slurm_partition: plgrid-gpu-a100
  slurm_additional_parameters:
    exclude: "t0021"

# =============================================================================
# Interpret Features Config
# =============================================================================
# Implements the DLM-Scope LLM-as-judge auto-interpretation protocol.
# For each SAE feature, generates a natural-language explanation via an LLM,
# then scores it via a discrimination task. Outputs explanations and
# interpretability scores as JSON.
#
# Run (offline vLLM):
#   uv run python main.py interpret-features configs/interpret_features.yaml
#
# Run with vLLM server:
#   uv run python main.py interpret-features configs/interpret_features.yaml \
#       --vllm_base_url=http://localhost:8000/v1
#
# Run for specific features:
#   uv run python main.py interpret-features configs/interpret_features.yaml --features 0 1 2 3 4
#
# Submit to Slurm:
#   uv run python main.py interpret-features configs/interpret_features.yaml \
#       --submit --infra.cluster=slurm
# =============================================================================

# -- Input --------------------------------------------------------------------
top_examples_path: "./experiments/top_examples/layer_00_top_examples.json"

# -- LLM settings -------------------------------------------------------------
llm_model: "meta-llama/Llama-3.1-8B-Instruct"

# null -> offline mode (loads model locally via vllm.LLM)
# URL  -> API mode (uses OpenAI-compatible HTTP API), e.g. "http://localhost:8000/v1"
vllm_base_url: null

# -- Inference parameters -----------------------------------------------------
batch_size: 32              # batch size for LLM requests
num_scoring_examples: 10    # total examples in the discrimination task
max_tokens_explanation: 256 # max tokens for explanation generation
max_tokens_scoring: 128     # max tokens for scoring response
temperature: 0.0            # deterministic generation

# -- Feature filtering --------------------------------------------------------
# null -> interpret all features in the top-examples mapping
# list -> restrict to specific feature indices, e.g. [0, 1, 2, 3, 4]
features: null

# -- Output -------------------------------------------------------------------
output_path: "./experiments/interpretation_results.json"

# -- Exca infra ---------------------------------------------------------------
# Used when submitting via --submit flag.
# cluster: null  -> run in current process (default)
# cluster: local -> run in a dedicated subprocess
# cluster: slurm -> submit to slurm
infra:
  version: "1"
  folder: "./experiments/cache/interpretation"
  cluster: null
  gpus_per_node: 1
  cpus_per_task: 4
  mem_gb: 32
  timeout_min: 2800
  slurm_partition: plgrid-gpu-a100
  slurm_constraint: null

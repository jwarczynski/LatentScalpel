# Interpret features — T5 Layer 23
top_examples_path: "./experiments/top_examples/t5/layer_23_top_examples.json"
llm_model: "Qwen/Qwen2.5-32B-Instruct-AWQ"
vllm_base_url: null
batch_size: 128
num_scoring_examples: 20
max_tokens_explanation: 256
max_tokens_scoring: 128
temperature: 0.0
features: null
output_path: "./experiments/results/t5/interpretation_results_layer_23.json"

infra:
  version: "1"
  folder: "./experiments/cache/interpretation_t5_l23"
  cluster: slurm
  gpus_per_node: 1
  cpus_per_task: 4
  mem_gb: 64
  timeout_min: 600
  slurm_partition: plgrid-gpu-a100
  slurm_additional_parameters:
    exclude: "t0021"

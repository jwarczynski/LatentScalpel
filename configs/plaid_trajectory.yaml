# =============================================================================
# PLAID Trajectory Feature Collection Config
# =============================================================================
# Runs PLAID's full denoising trajectory and records SAE feature activations
# at each sampled timestep.
#
# Run:
#   uv run python main.py collect-plaid-trajectory configs/plaid_trajectory.yaml
#
# Submit to Slurm:
#   uv run python main.py collect-plaid-trajectory configs/plaid_trajectory.yaml \
#       --submit --infra.cluster=slurm
# =============================================================================

# -- Model --------------------------------------------------------------------
weights_path: "models/plaid/plaid1b_weights"
dim: 2048
embed_dim: 16
n_blocks: 24
n_heads: 32
vocab_size: 32768
gamma_0: -3.0
gamma_1: 6.0

# -- SAE ----------------------------------------------------------------------
sae_checkpoint_dir: "./experiments/sae_checkpoints/plaid"
layers: [0, 23]

# -- Dataset ------------------------------------------------------------------
# NOTE: openwebtext only has a "train" split. For trajectory analysis we
# should ideally use a held-out set. Consider using skip_samples to carve
# out a disjoint slice from the training data.
dataset_name: "openwebtext"
dataset_split: "train"
max_samples: null
seq_len: 256

# -- Diffusion ----------------------------------------------------------------
# NOTE: Standardised to 256 steps (same as plaid_evaluation.yaml) for
# consistency across all PLAID pipelines.  Every step is recorded
# (timestep_subsample=1) so we get 256 trajectory data-points — enough
# resolution without the overhead of 4096 steps.
sampling_timesteps: 256
score_temp: 0.9
timestep_subsample: 1  # record every step (256 total)

# -- Collection ---------------------------------------------------------------
batch_size: 2
top_k_to_record: 64
device: "cuda:0"
random_seed: 42
output_path: "./experiments/results/plaid/trajectory_features.json"

# -- Exca infra ---------------------------------------------------------------
infra:
  version: "1"
  folder: "./experiments/cache/plaid_trajectory"
  cluster: slurm
  gpus_per_node: 1
  cpus_per_task: 4
  mem_gb: 64
  timeout_min: 480
  slurm_partition: plgrid-gpu-a100

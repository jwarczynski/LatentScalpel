# =============================================================================
# Find Top-Activating Examples Config
# =============================================================================
# Runs SAE inference over stored activations to identify, for each feature,
# the top-K dataset examples with the highest activation values.
# Outputs a compact JSON mapping used by the interpret-features stage.
#
# Run:
#   uv run python main.py find-top-examples configs/find_top_examples.yaml
#
# Run for specific features:
#   uv run python main.py find-top-examples configs/find_top_examples.yaml --features 0 1 2 3 4
#
# Submit to Slurm:
#   uv run python main.py find-top-examples configs/find_top_examples.yaml \
#       --submit --infra.cluster=slurm
# =============================================================================

# -- Input --------------------------------------------------------------------
sae_checkpoint_path: "./experiments/sae_checkpoints/genie/layer_01_best.ckpt"
activation_dir: "./experiments/activations/genie/xsum/train"
layer_idx: 1

# -- Dataset ------------------------------------------------------------------
dataset_name: "xsum"
dataset_split: "train"

# -- Top-K selection ----------------------------------------------------------
top_k: 30                  # number of top examples to keep per feature

# true  -> each dataset example appears at most once per feature (default)
# false -> allow duplicates across timesteps (useful to see if an example
#          activates strongly at multiple noise levels)
unique_examples: true

# -- Feature / timestep filtering ---------------------------------------------
# null -> process all features in the SAE dictionary
# list -> restrict to specific feature indices, e.g. [0, 1, 2, 3, 4]
features: null

# null -> process all timesteps found in the activation directory
# list -> restrict to specific diffusion timesteps, e.g. [100, 200, 300]
timesteps: null

# -- Output -------------------------------------------------------------------
# Output file is written to {output_dir}/layer_{layer_idx:02d}_top_examples.json
output_dir: "./experiments/top_examples/genie"

# -- Hardware -----------------------------------------------------------------
device: "cuda:0"
batch_size: 4096            # batch size for SAE inference

# -- Exca infra ---------------------------------------------------------------
# Used when submitting via --submit flag.
# cluster: null  -> run in current process (default)
# cluster: local -> run in a dedicated subprocess
# cluster: slurm -> submit to slurm
infra:
  version: "1"
  folder: "./experiments/cache/top_examples"
  cluster: null
  gpus_per_node: 1
  cpus_per_task: 4
  mem_gb: 32
  timeout_min: 60
  slurm_partition: plgrid-gpu-a100
  slurm_constraint: null

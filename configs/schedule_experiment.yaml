# =============================================================================
# Schedule Modification Experiment Config
# =============================================================================
# Runs the denoising process with a modified schedule and compares temporal
# profiles against the standard schedule.
#
# Run:
#   uv run python main.py run-schedule-experiment configs/schedule_experiment.yaml
#
# Submit to Slurm:
#   uv run python main.py run-schedule-experiment configs/schedule_experiment.yaml \
#       --submit --infra.cluster=slurm
# =============================================================================

# -- Model --------------------------------------------------------------------
model_type: "genie"
model_checkpoint_path: "models/genie/GENIE_ckpt-XSum"
model_arch: "s2s_CAT"
in_channel: 128
model_channels: 128
out_channel: 128
vocab_size: 30522
config_name: "bert-base-uncased"
logits_mode: 1
init_pretrained: false
token_emb_type: "random"
learn_sigma: false
fix_encoder: false

# -- SAE ---------------------------------------------------------------------
sae_checkpoint_dir: "./experiments/sae_checkpoints/genie"
layers: [0, 5]

# -- Schedule modification ---------------------------------------------------
modification_type: "reduce_total"
modification_params:
  new_total: 1500

# -- Trajectory collection ----------------------------------------------------
timestep_subsample: 20
top_k_to_record: 64

# -- Diffusion ----------------------------------------------------------------
diffusion_steps: 2000
noise_schedule: "sqrt"

# -- Dataset ------------------------------------------------------------------
dataset_name: "xsum"
dataset_split: "validation"
max_samples: null
batch_size: 8

# -- Output -------------------------------------------------------------------
output_dir: "./experiments/schedule_experiment"

# -- Device -------------------------------------------------------------------
device: "cuda:0"
random_seed: 42

# -- Exca infra ---------------------------------------------------------------
infra:
  version: "1"
  folder: "./experiments/cache/schedule_experiment"
  cluster: null
  gpus_per_node: 1
  cpus_per_task: 4
  mem_gb: 32
  timeout_min: 1440
  slurm_partition: plgrid-gpu-a100

# =============================================================================
# Feature Intervention Experiment Config
# =============================================================================
# Runs activation patching on specific SAE features during the reverse
# diffusion chain and compares baseline vs patched generation quality.
#
# Run:
#   uv run python main.py run-intervention configs/intervention.yaml
#
# Submit to Slurm:
#   uv run python main.py run-intervention configs/intervention.yaml \
#       --submit --infra.cluster=slurm
# =============================================================================

# -- Model --------------------------------------------------------------------
model_type: "genie"
model_checkpoint_path: "models/genie/GENIE_ckpt-XSum"
model_arch: "s2s_CAT"
in_channel: 128
model_channels: 128
out_channel: 128
vocab_size: 30522
config_name: "bert-base-uncased"
logits_mode: 1
init_pretrained: false
token_emb_type: "random"
learn_sigma: false
fix_encoder: false

# -- SAE ---------------------------------------------------------------------
sae_checkpoint_dir: "./experiments/sae_checkpoints/genie"
layer: 5

# -- Intervention -------------------------------------------------------------
feature_selection: "auto"          # "manual" or "auto"
# feature_indices: [42, 87, 156]  # used when feature_selection is "manual"
classification_json_path: "./experiments/results/genie/classification_layer5.json"
target_magnitude: 0.0              # suppress features (set activation to 0)
intervention_nds_values: [1000]    # intervene at NDS=1000 (midpoint)

# -- Diffusion ----------------------------------------------------------------
diffusion_steps: 2000
noise_schedule: "sqrt"

# -- Dataset ------------------------------------------------------------------
dataset_name: "xsum"
dataset_split: "validation"
max_samples: 100
batch_size: 8

# -- Output -------------------------------------------------------------------
num_text_examples: 10
loss_log_interval: 100
output_path: "./experiments/results/genie/intervention_results.json"

# -- Device -------------------------------------------------------------------
device: "cuda:0"
random_seed: 42

# -- Exca infra ---------------------------------------------------------------
infra:
  version: "1"
  folder: "./experiments/cache/intervention"
  cluster: null
  gpus_per_node: 1
  cpus_per_task: 4
  mem_gb: 32
  timeout_min: 1440
  slurm_partition: plgrid-gpu-a100

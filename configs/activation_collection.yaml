# =============================================================================
# Activation Collection Config
# =============================================================================
# Collects residual-stream activations from GENIE decoder layers to disk.
#
# Run:
#   uv run python main.py collect-activations configs/activation_collection.yaml
#
# Override infra for slurm:
#   uv run python main.py collect-activations configs/activation_collection.yaml \
#       --infra.cluster=slurm --infra.gpus_per_node=1
# =============================================================================

# -- Model --------------------------------------------------------------------
model_checkpoint_path: "GENIE_ckpt-XSum"
model_arch: "s2s_CAT"
in_channel: 128
model_channels: 128
out_channel: 128
vocab_size: 30522
config_name: "bert-base-uncased"
logits_mode: 1
init_pretrained: false
token_emb_type: "random"
learn_sigma: false
fix_encoder: false

# -- Dataset ------------------------------------------------------------------
dataset_name: "xsum"
dataset_split: "train"
max_samples: 10000

# To collect val/test activations, run again with different split and output_dir:
#   --dataset_split=validation --output_dir=./experiments/activations_val
#   --dataset_split=test --output_dir=./experiments/activations_test

# -- Diffusion ----------------------------------------------------------------
diffusion_steps: 2000
noise_schedule: "sqrt"
diffusion_timesteps: [100, 200, 300, 400, 500, 600, 700, 800, 900, 1000]

# -- Collection ---------------------------------------------------------------
batch_size: 16
output_dir: "./experiments/activations"
force_overwrite: false
device: "cuda:0"
random_seed: 42

# -- Exca infra ---------------------------------------------------------------
# cluster: null  -> run in current process (default)
# cluster: local -> run in a dedicated subprocess
# cluster: slurm -> submit to slurm
# cluster: auto  -> slurm if available, otherwise local
infra:
  version: "1"
  folder: "./experiments/cache/collection"
  cluster: null
  # Slurm resources (used when cluster is "slurm" or "auto")
  gpus_per_node: 1
  cpus_per_task: 4
  mem_gb: 32
  timeout_min: 360
  slurm_partition: null
  slurm_constraint: null

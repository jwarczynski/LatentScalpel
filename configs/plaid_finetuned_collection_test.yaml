# =============================================================================
# Activation Collection — Fine-tuned PLAID v3b (TEST split)
# =============================================================================
# Used for SAE test/evaluation. 3K test samples matching GENIE.
weights_path: "models/plaid/plaid1b_weights"
checkpoint_path: "experiments/plaid_xsum_v3b/checkpoints/cond-256-lr1e6-cosine-100ep/best-epoch85.ckpt"

dataset_name: "xsum"
dataset_split: "test"
data_dir: "datasets/glge-released-dataset/easy/xsum_data/org_data"
tokenizer_path: "models/plaid/plaid1b_weights/tokenizer.json"
max_samples: 3000
seq_len: 256

diffusion_t_values: [0.05, 0.15, 0.25, 0.35, 0.45, 0.55, 0.65, 0.75, 0.85, 0.95]

batch_size: 4
output_dir: "./experiments/activations/plaid_finetuned_v3b/xsum/test"
force_overwrite: false
device: "cuda:0"
random_seed: 42
layers: [0, 4, 10, 14, 20, 23]

infra:
  version: "1"
  folder: "./experiments/cache/plaid_finetuned_v3b_collection_test"
  cluster: slurm
  gpus_per_node: 1
  cpus_per_task: 4
  mem_gb: 128
  timeout_min: 720
  slurm_partition: plgrid-gpu-a100
